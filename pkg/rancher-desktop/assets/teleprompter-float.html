<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Teleprompter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        background: transparent;
        color: #e6edf3;
        overflow: hidden;
        height: 100%;
        user-select: none;
        -webkit-app-region: drag;
      }

      .container {
        display: flex;
        flex-direction: row;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 0 0 14px 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-top: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        -webkit-app-region: no-drag;
      }

      /* Drag handle — left side */
      .drag-handle {
        -webkit-app-region: drag;
        width: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
        opacity: 0.3;
        transition: opacity 0.2s;
        flex-shrink: 0;
      }
      .drag-handle:hover { opacity: 0.7; }
      .drag-handle .dots {
        width: 4px;
        height: 32px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.4);
      }

      /* Text area */
      .tp-scroll-area {
        flex: 1;
        overflow: hidden;
        padding: 10px 16px 12px;
        position: relative;
      }

      .tp-text {
        font-size: 28px;
        line-height: 1.4;
        font-weight: 500;
        letter-spacing: 0.01em;
        transition: transform 0.4s ease;
      }

      .tp-text .w {
        display: inline;
        cursor: pointer;
      }
      .tp-text .w:hover { text-decoration: underline; }
      .tp-text .w.spoken { opacity: 0.15; }
      .tp-text .w.current {
        color: var(--highlight-color, #58a6ff);
        font-weight: 600;
      }
      .tp-text .w.near { opacity: 0.9; }
      .tp-text .w.upcoming { opacity: 0.7; }
      .tp-text .w.far { opacity: 0.4; }

      /* Close button */
      .close-btn {
        position: absolute;
        top: 6px;
        right: 8px;
        width: 22px;
        height: 22px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.5);
        border-radius: 6px;
        font-size: 14px;
        line-height: 22px;
        text-align: center;
        cursor: pointer;
        z-index: 10;
        -webkit-app-region: no-drag;
        transition: background 0.15s, color 0.15s;
      }
      .close-btn:hover {
        background: rgba(255, 80, 80, 0.6);
        color: #fff;
      }

      /* Gradient fade at bottom */
      .tp-scroll-area::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="drag-handle"><div class="dots"></div></div>
      <div class="tp-scroll-area">
        <div class="tp-text" id="tp-text"></div>
      </div>
      <button class="close-btn" id="close-btn">&times;</button>
    </div>

    <script>
      const { ipcRenderer } = require('electron');
      const textEl = document.getElementById('tp-text');

      document.getElementById('close-btn').addEventListener('click', () => {
        ipcRenderer.invoke('teleprompter:close');
      });

      let words = [];
      let currentIndex = 0;

      function render() {
        if (!textEl || words.length === 0) return;

        textEl.innerHTML = words.map((word, i) => {
          let cls = 'w';
          if (i < currentIndex) cls += ' spoken';
          else if (i === currentIndex) cls += ' current';
          else if (i <= currentIndex + 3) cls += ' near';
          else if (i <= currentIndex + 20) cls += ' upcoming';
          else cls += ' far';
          return `<span class="${cls}" data-idx="${i}">${word} </span>`;
        }).join('');

        // Scroll to current word
        const spans = textEl.querySelectorAll('.w');
        const currentSpan = spans[currentIndex];
        if (currentSpan) {
          const container = textEl.parentElement;
          const targetY = 10;
          const wordTop = currentSpan.offsetTop;
          const offset = wordTop - targetY;
          const maxScroll = textEl.scrollHeight - container.clientHeight;
          const clamped = Math.min(Math.max(0, offset), Math.max(0, maxScroll));
          textEl.style.transform = `translateY(${-clamped}px)`;
        }
      }

      // Click a word to jump to it
      textEl.addEventListener('click', (e) => {
        const span = e.target.closest('.w');
        if (!span) return;
        const idx = parseInt(span.dataset.idx, 10);
        if (isNaN(idx)) return;
        currentIndex = idx;
        render();
        // Notify main process so tracking composable syncs
        ipcRenderer.invoke('teleprompter:jump-to', { currentIndex: idx });
      });

      // Scroll wheel to move through words
      let scrollAccum = 0;
      document.querySelector('.tp-scroll-area').addEventListener('wheel', (e) => {
        e.preventDefault();
        // Accumulate delta and step by whole words
        scrollAccum += e.deltaY;
        const step = Math.trunc(scrollAccum / 40);
        if (step !== 0) {
          scrollAccum -= step * 40;
          const newIndex = Math.max(0, Math.min(words.length - 1, currentIndex + step));
          if (newIndex !== currentIndex) {
            currentIndex = newIndex;
            render();
            ipcRenderer.invoke('teleprompter:jump-to', { currentIndex });
          }
        }
      }, { passive: false });

      // Receive script from main window
      ipcRenderer.on('teleprompter:set-script', (_e, data) => {
        words = data.words || [];
        currentIndex = data.currentIndex || 0;
        render();
      });

      // Receive position updates
      ipcRenderer.on('teleprompter:update-position', (_e, data) => {
        currentIndex = data.currentIndex;
        render();
      });

      // Receive style updates
      ipcRenderer.on('teleprompter:set-style', (_e, data) => {
        if (data.fontSize) textEl.style.fontSize = data.fontSize + 'px';
        if (data.highlightColor) {
          document.documentElement.style.setProperty('--highlight-color', data.highlightColor);
        }
      });
    </script>
  </body>
</html>
