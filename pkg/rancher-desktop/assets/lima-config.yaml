# Default Lima configuration; parts will be overridden in code.

# Rancher Desktop ships with a patched QEMU that supports the Apple M4 CPU
# So override Lima 1.0.3 falling back to cortex-a72.
cpuType:
  aarch64: host

ssh:
  loadDotSSHPubKeys: false
firmware:
  legacyBIOS: false
containerd:
  system: false
  user: false
# Provisioning scripts run on every boot, not just initial VM provisioning.
provision:
- # Boot timing + sshd early start — MUST be first script.
  # Lima hostagent polls SSH every 10s; starting sshd ASAP lets us catch the 2nd poll (~10s)
  # instead of waiting for the 3rd (~20s), saving ~10s of boot time.
  mode: system
  script: |
    #!/bin/sh
    LOG=/var/log/boot-perf.log
    echo "===== Boot started at $(date -u '+%Y-%m-%dT%H:%M:%S') =====" > "$LOG"
    echo "[boot-perf] kernel uptime: $(cut -d' ' -f1 /proc/uptime)s" >> "$LOG"
    # --- Ensure sshd starts in OpenRC boot runlevel (before provisioning on future boots) ---
    sed -i -E 's/^#?MaxSessions +[0-9]+/MaxSessions 25/g' /etc/ssh/sshd_config
    rc-update add sshd boot 2>/dev/null || true
    if ! ss -tlnp | grep -q ':22 '; then
      rc-service sshd start 2>/dev/null || true
    fi
    echo "[boot-perf] sshd-early-start: $(cut -d' ' -f1 /proc/uptime)s (listening=$(ss -tlnp | grep -q ':22 ' && echo YES || echo NO))" >> "$LOG"
    echo "[boot-perf] entropy available: $(cat /proc/sys/kernel/random/entropy_avail)" >> "$LOG"
- # When the ISO image is updated, only preserve selected data from /etc but otherwise use the new files.
  # Update files in /usr/local on the data volume from the new versions on the ISO.
  mode: system
  script: |
    #!/bin/sh
    set -o errexit -o nounset -o xtrace
    mkdir -p /bootfs
    mount --bind / /bootfs
    # /bootfs/etc is empty on first boot because it has been moved to /mnt/data/etc by lima
    if [ -f /bootfs/etc/os-release ]; then
      # Alpine turned /etc/os-release into a symlink; we dereference it again. If we still have a symlink
      # here, then this is an upgrade from an older version and needs to go through the migration.
      if [ -L /etc/os-release ] || ! diff -q /etc/os-release /bootfs/etc/os-release; then
        # When we are upgrading from an ISO we will install new packages during boot.
        # But Lima will restore the old /etc/apk/world file and run `apk fix --no-network`
        # to restore packages from cache that were installed manually. This will however
        # uninstall all packages again that were not previously installed because they are
        # not listed in the old world file. We need to install them once more from the
        # boot media to update the world file.
        # We are not bothering with uninstalling packages that are not part of the new release.
        apk add --no-network --keys-dir /bootfs/etc/apk/keys --repositories-file /bootfs/etc/apk/repositories \
          $(cat /bootfs/etc/apk/world)

        # Using a temp file just in case dereferencing a symlink onto itself has a race condition.
        cp -L /etc/os-release /etc/os-release.tmp
        mv /etc/os-release.tmp /etc/os-release

        cp /etc/machine-id /bootfs/etc
        cp /etc/ssh/ssh_host* /bootfs/etc/ssh/
        mkdir -p /etc/docker /etc/rancher
        cp -pr /etc/docker /bootfs/etc
        cp -pr /etc/rancher /bootfs/etc

        rm -rf /mnt/data/etc.prev
        mkdir /mnt/data/etc.prev
        mv /etc/* /mnt/data/etc.prev
        cp -L /bootfs/etc/os-release /tmp/os-release
        mv /bootfs/etc/* /etc
        mv /tmp/os-release /etc

        # install updated files from /usr/local, e.g. nerdctl, buildkit, cni plugins
        cp -pr /bootfs/usr/local /usr

        # Keep the lima-init.log around for debugging    
        cp /var/log/lima-init.log /mnt/data/lima-init-upgrade.log

        # lima has applied changes while the "old" /etc was in place; restart to apply them to the updated one.
        reboot
      fi
    fi
    umount /bootfs
    rmdir /bootfs
- # Consolidated fast boot setup — combines cgroup, SSH config, mounts, hostname,
  # docker certs, cron, user group, bpf mounts, and cleanup into one script to
  # eliminate per-script shell spawn overhead. Each section is timed.
  mode: system
  script: |
    #!/bin/sh
    set -o errexit -o nounset
    LOG=/var/log/boot-perf.log
    T() { cut -d' ' -f1 /proc/uptime; }

    # --- cgroup mode ---
    t0=$(T)
    RC_CGROUP_MODE=unified
    if ! grep -q -E "^#?rc_cgroup_mode=\"$RC_CGROUP_MODE\"" /etc/rc.conf; then
      sed -i -E "s/^#?rc_cgroup_mode=\".*\"/rc_cgroup_mode=\"$RC_CGROUP_MODE\"/" /etc/rc.conf
      if grep -q -E "^rc_cgroup_mode=\"$RC_CGROUP_MODE\"" /etc/rc.conf; then
        reboot
      fi
    fi
    echo "[boot-perf] cgroup-check: ${t0}s -> $(T)s" >> "$LOG"

    # --- fstrim (backgrounded) ---
    fstrim /mnt/data &

    # --- Persist /root ---
    t0=$(T)
    if ! [ -d /mnt/data/root ]; then
      mkdir -p /root
      mv /root /mnt/data/root
    fi
    mkdir -p /root
    mount --bind /mnt/data/root /root
    echo "[boot-perf] persist-root: ${t0}s -> $(T)s" >> "$LOG"

    # --- Docker certs.d symlink ---
    mkdir -p /etc/docker
    [ -L /etc/docker/certs.d ] && rm /etc/docker/certs.d
    if [ ! -e /etc/docker/certs.d ]; then
      if [ -d "/Users/{{.User}}" ]; then
        ln -s "/Users/{{.User}}/.docker/certs.d" /etc/docker
      elif [ -d "/home/{{.User}}" ]; then
        ln -s "/home/{{.User}}/.docker/certs.d" /etc/docker
      fi
    fi

    # --- Hostname ---
    hostname lima-rancher-desktop

    # --- Filesystem cleanup (tmp backgrounded) ---
    rm -rf /var/lib/rancher/k3s/data
    find /tmp -depth -mtime +3 -delete &

    # --- Shared mounts ---
    # Guard each entry with `mountpoint -q` because the base image may not
    # make all of these distinct mounts. Historically (pre-2021-09) /etc was
    # a bind mount in this Alpine ISO; it isn't currently. With `set -e` an
    # unguarded `mount --make-shared /etc` would fail with "Invalid argument"
    # and abort the rest of this consolidated script.
    t0=$(T)
    for dir in / /etc /tmp /var/lib; do
      mountpoint -q "${dir}" && mount --make-shared "${dir}"
    done
    echo "[boot-perf] shared-mounts: ${t0}s -> $(T)s" >> "$LOG"

    # --- Cron/logrotate ---
    mv -n /etc/periodic/daily/logrotate /etc/periodic/hourly/ 2>/dev/null || true
    rc-update add crond default 2>/dev/null || true
    rc-service crond start

    # --- Docker group --- (also duplicated in a dedicated provisioning block
    # below so it still runs if this consolidated script aborts early.)
    usermod --append --groups docker "{{.User}}"

    # --- mkcert (cached) ---
    t0=$(T)
    export CAROOT=/run/mkcert
    mkdir -p $CAROOT
    if [ -f /mnt/data/mkcert/localhost.pem ] && [ -f /mnt/data/mkcert/localhost-key.pem ] && [ -f /mnt/data/mkcert/rootCA.pem ]; then
      cp /mnt/data/mkcert/*.pem $CAROOT/
    else
      cd $CAROOT
      mkcert -install
      mkcert localhost
      mkdir -p /mnt/data/mkcert
      cp $CAROOT/*.pem /mnt/data/mkcert/
    fi
    chown -R nobody:nobody $CAROOT
    echo "[boot-perf] mkcert: ${t0}s -> $(T)s" >> "$LOG"

    # --- OpenResty config ---
    t0=$(T)
    sed -i 's/^command_background/#command_background/' /etc/init.d/rd-openresty
    allowed_images_conf=/usr/local/openresty/nginx/conf/allowed-images.conf
    obsolete_image_allow_list_conf=/usr/local/openresty/nginx/conf/image-allow-list.conf
    setproxy="[ -f $allowed_images_conf ] && supervise_daemon_args=\"-e HTTPS_PROXY=http://127.0.0.1:3128 \${supervise_daemon_args:-}\" || true"
    for svc in containerd docker; do
      sed -i "\#-f $allowed_images_conf#d" /etc/init.d/$svc
      sed -i "\#-f $obsolete_image_allow_list_conf#d" /etc/init.d/$svc
      echo "$setproxy" >> /etc/init.d/$svc
    done
    install -d -m755 /var/log/openresty
    echo "[boot-perf] openresty-config: ${t0}s -> $(T)s" >> "$LOG"

    # --- BPF + cgroup mounts ---
    mount bpffs -t bpf /sys/fs/bpf
    mount --make-shared /sys/fs/bpf
    mount --make-shared /sys/fs/cgroup

    echo "[boot-perf] consolidated-script done at uptime $(T)s" >> "$LOG"
- # Persist /var/lib/docker on the data volume.
  #
  # Without this, docker's data root sits on the VM's tmpfs root (RAM-backed,
  # ~6GB ceiling). Two bad consequences:
  #   1. Non-trivial image pulls fail mid-download with "no space left on
  #      device" because extraction fills RAM quickly.
  #   2. Every VM reboot wipes tmpfs, so every image (postgres, redis, all
  #      extensions) has to be re-pulled from scratch on each startup.
  #
  # Bind-mounting /mnt/data/var/lib/docker (on the 98GB ext4 data-volume)
  # over /var/lib/docker fixes both: docker gets the full persistent disk
  # AND images/containers survive across reboots.
  #
  # Runs as a provision.system script, which completes during cloud-init
  # before Rancher Desktop issues `rc-service docker start` from the host,
  # so the bind mount is in place when the daemon initializes.
  #
  # Idempotent: on boots where the mount already exists, exits early.
  # First boot: seeds /mnt/data/var/lib/docker with whatever was pre-created
  # in the tmpfs /var/lib/docker (usually empty).
  mode: system
  script: |
    #!/bin/sh
    LOG=/var/log/boot-perf.log
    PERSIST=/mnt/data/var/lib/docker
    LIVE=/var/lib/docker
    t0=$(cut -d' ' -f1 /proc/uptime)

    if mountpoint -q "$LIVE"; then
      echo "[boot-perf] docker-persist: already mounted, skipping" >> "$LOG"
      exit 0
    fi

    mkdir -p "$(dirname "$PERSIST")"
    if [ ! -d "$PERSIST" ]; then
      mkdir -p "$PERSIST"
      chmod 710 "$PERSIST"
      # Seed persistent dir from any pre-existing tmpfs contents so we don't
      # lose state on the boot that introduces this mount. `cp -a` preserves
      # ownership/perms; failure is non-fatal — worst case docker starts clean.
      if [ -d "$LIVE" ] && [ -n "$(ls -A "$LIVE" 2>/dev/null)" ]; then
        cp -a "$LIVE/." "$PERSIST/" 2>/dev/null || true
      fi
    fi

    mkdir -p "$LIVE"
    if mount --bind "$PERSIST" "$LIVE"; then
      echo "[boot-perf] docker-persist: bound ${PERSIST} -> ${LIVE} in $(cut -d' ' -f1 /proc/uptime)s (from ${t0}s)" >> "$LOG"
    else
      echo "[boot-perf] docker-persist: bind mount FAILED — docker will use tmpfs (may fill RAM)" >> "$LOG"
    fi
- # Ensure the Lima SSH user is in the docker group so that SSH-forwarded
  # connections to /var/run/docker.sock (→ ~/.rd/docker.sock on the host) can
  # actually read the socket. Runs as its own script (no set -e) so it is
  # isolated from any failure in the consolidated setup block above. Idempotent
  # and runs on every boot. Uses Lima's {{.User}} template — no hardcoded name.
  mode: system
  script: |
    #!/bin/sh
    LOG=/var/log/boot-perf.log
    USER_NAME="{{.User}}"
    # Wait briefly for the docker group to exist. Docker is installed by other
    # provisioning steps; on a slow first boot the group may not be present yet.
    for i in 1 2 3 4 5; do
      getent group docker >/dev/null 2>&1 && break
      sleep 1
    done
    if getent group docker >/dev/null 2>&1 && id "$USER_NAME" >/dev/null 2>&1; then
      if ! id -nG "$USER_NAME" | tr ' ' '\n' | grep -qx docker; then
        usermod --append --groups docker "$USER_NAME" \
          && echo "[boot-perf] docker-group: added $USER_NAME" >> "$LOG" \
          || echo "[boot-perf] docker-group: usermod failed for $USER_NAME" >> "$LOG"
      fi
    else
      echo "[boot-perf] docker-group: docker group or user $USER_NAME missing" >> "$LOG"
    fi
- # we run trivy as root now; remove any cached databases installed into the user directory by previous version
  # trivy.db is 600M and trivy-java.db is 1.1G
  mode: user
  script: |
    rm -rf "${HOME}/.cache/trivy"
- # Sulla Threat Proxy — DNS baseline (Quad9 threat-blocking resolver).
  # Quad9 (9.9.9.9) blocks known malicious domains at the DNS layer.
  # This is a zero-cost first-line defense that runs before any traffic hits
  # the in-VM mitmproxy. See pkg/rancher-desktop/main/threat-proxy/ for the
  # rest of the stack (URLhaus, Safe Browsing, VirusTotal, prompt-injection scan).
  mode: system
  script: |
    #!/bin/sh
    LOG=/var/log/sulla-threat-proxy.log
    mkdir -p "$(dirname "$LOG")"
    echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [dns-pivot] installing Quad9 resolver" >> "$LOG"
    # Write resolv.conf directly. Quad9 primary + secondary, then Cloudflare 1.1.1.2
    # (malware-blocking "for Families" variant) as fallback.
    cat > /etc/resolv.conf <<'EOF'
    # Managed by Sulla Desktop — threat-blocking resolvers
    nameserver 9.9.9.9
    nameserver 149.112.112.112
    nameserver 1.1.1.2
    options timeout:2 attempts:2
    EOF
    # Prevent DHCP/udhcpc from clobbering our resolvers on lease renewal.
    # chattr +i is a no-op on tmpfs/overlay; we guard it so the script never fails.
    chattr +i /etc/resolv.conf 2>/dev/null || true
    echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [dns-pivot] resolv.conf pinned: $(cat /etc/resolv.conf | tr '\n' ';')" >> "$LOG"
    # Smoke test — resolve a benign domain to confirm DNS actually works.
    if nslookup example.com 9.9.9.9 >/dev/null 2>&1; then
      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [dns-pivot] Quad9 reachable" >> "$LOG"
    else
      echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [dns-pivot] WARN: Quad9 resolution failed" >> "$LOG"
    fi
- # Final boot timing — captures end-of-provisioning state
  mode: system
  script: |
    #!/bin/sh
    LOG=/var/log/boot-perf.log
    echo "[boot-perf] ===== All provisioning scripts complete at $(date -u '+%H:%M:%S') =====" >> "$LOG"
    echo "[boot-perf] kernel uptime at completion: $(cut -d' ' -f1 /proc/uptime)s" >> "$LOG"
    echo "[boot-perf] entropy at completion: $(cat /proc/sys/kernel/random/entropy_avail)" >> "$LOG"
    echo "[boot-perf] sshd listening: $(ss -tlnp | grep ':22 ' || echo 'NOT LISTENING')" >> "$LOG"
    echo "[boot-perf] --- Process list ---" >> "$LOG"
    ps aux >> "$LOG" 2>&1 || true
portForwards:
- guestPortRange: [1, 65535]
  guestIPMustBeZero: true
  hostIP: "0.0.0.0"
  proto: any
