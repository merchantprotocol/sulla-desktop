# Sulla Desktop - Reliable Kubernetes Deployments
# Applied automatically on startup - improved reliability
---
apiVersion: v1
kind: Namespace
metadata:
  name: sulla
---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sulla
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          hostPort: 30116
        env:
        - name: POSTGRES_USER
          value: "sulla"
        - name: POSTGRES_PASSWORD
          value: "sulla_dev_password"
        - name: POSTGRES_DB
          value: "sulla"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "sulla"]
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "sulla"]
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
      volumes:
      - name: postgres-data
        hostPath:
          path: /var/lib/sulla/postgres
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sulla
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    nodePort: 30116
  type: NodePort
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sulla
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
          hostPort: 30117
        command: ["redis-server"]
        args: ["--appendonly", "yes", "--save", "60", "1"]
        volumeMounts:
        - mountPath: /data
          name: redis-data
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
      volumes:
      - name: redis-data
        hostPath:
          path: /var/lib/sulla/redis
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sulla
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    nodePort: 30117
  type: NodePort
---
# WebSocket Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  namespace: sulla
  labels:
    app: ws-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-server
  template:
    metadata:
      labels:
        app: ws-server
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: ws
        image: ghcr.io/merchantprotocol/sulla-docker-websocket:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: ws-server
  namespace: sulla
spec:
  selector:
    app: ws-server
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30118
  type: NodePort
