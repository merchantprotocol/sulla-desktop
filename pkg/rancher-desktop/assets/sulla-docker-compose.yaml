services:
  postgres:
    image: postgres:16-alpine
    container_name: sulla_postgres
    ports:
      - "30116:5432"
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=sulla
      - POSTGRES_PASSWORD=sulla_dev_password
      - POSTGRES_DB=sulla
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - "{{sullaDataDir}}/sulla-postgres:/var/lib/postgresql/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sulla"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sulla_redis
    ports:
      - "30117:6379"
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - "{{sullaDataDir}}/sulla-redis:/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  ws-server:
    image: ghcr.io/merchantprotocol/sulla-docker-websocket:latest
    container_name: sulla_ws_server
    ports:
      - "30118:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 10s
      timeout: 5s
      retries: 3
