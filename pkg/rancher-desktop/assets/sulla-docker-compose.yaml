services:
  postgres:
    image: postgres:16-alpine
    container_name: sulla_postgres
    ports:
      - "30116:5432"
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=sulla
      - POSTGRES_PASSWORD=sulla_dev_password
      - POSTGRES_DB=sulla
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - "sulla_postgres_data:/var/lib/postgresql/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sulla"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sulla_redis
    ports:
      - "30117:6379"
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  python_runtime:
    image: sulla/python-runtime:dev
    container_name: sulla_python_runtime
    ports:
      - "127.0.0.1:30118:8080"
    volumes:
      - "{{sullaFunctionsDir}}:/var/functions:ro"
      - "sulla_python_runtime_cache:/opt/sulla/cache/deps"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  shell_runtime:
    image: sulla/shell-runtime:dev
    container_name: sulla_shell_runtime
    ports:
      - "127.0.0.1:30119:8080"
    volumes:
      - "{{sullaFunctionsDir}}:/var/functions:ro"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  node_runtime:
    image: sulla/node-runtime:dev
    container_name: sulla_node_runtime
    ports:
      - "127.0.0.1:30120:8080"
    volumes:
      - "{{sullaFunctionsDir}}:/var/functions:ro"
      - "sulla_node_runtime_cache:/opt/sulla/cache/node_modules"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  sulla_postgres_data:
  sulla_python_runtime_cache:
  sulla_node_runtime_cache:
