<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tab Context Menu</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        /* Dark theme (default) - matches 3-dots menu */
        --menu-bg: rgba(30, 41, 59, 0.98);
        --menu-border: rgba(51, 65, 85, 0.6);
        --menu-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 0, 0, 0.3);
        --text-primary: #f1f5f9;
        --text-hover: #38bdf8;
        --item-hover-bg: rgba(56, 189, 248, 0.1);
        --icon-opacity: 0.6;
        --separator-bg: rgba(71, 85, 105, 0.6);
      }

      /* OS preference fallback when IPC doesn't work */
      @media (prefers-color-scheme: light) {
        :root:not(.light-mode):not(.dark-mode) {
          --menu-bg: rgba(255, 255, 255, 0.98);
          --menu-border: rgba(148, 163, 184, 0.4);
          --menu-shadow: 0 16px 48px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
          --text-primary: #334155;
          --text-hover: #0284c7;
          --item-hover-bg: rgba(14, 165, 233, 0.1);
          --icon-opacity: 0.7;
          --separator-bg: rgba(148, 163, 184, 0.3);
        }
      }

      html, body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        background: transparent;
        color: var(--text-primary);
        user-select: none;
        overflow: hidden;
      }

      .menu {
        min-width: 240px;
        background: var(--menu-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--menu-border);
        border-radius: 8px;
        box-shadow: var(--menu-shadow);
        padding: 6px 0;
        animation: fadeIn 0.12s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.96); }
        to   { opacity: 1; transform: scale(1); }
      }

      .menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 7px 14px;
        border: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        text-align: left;
        transition: background 0.1s, color 0.1s;
      }

      .menu-item:hover {
        background: var(--item-hover-bg);
        color: var(--text-hover);
      }

      .menu-item:hover .menu-icon {
        opacity: 1;
        stroke: var(--text-hover);
      }

      .menu-icon {
        width: 14px;
        height: 14px;
        opacity: var(--icon-opacity);
        flex-shrink: 0;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
      }

      .separator {
        height: 1px;
        background: var(--separator-bg);
        margin: 4px 0;
      }

      /* Light mode override class (set by IPC) - uses !important to override media query */
      html.light-mode {
        --menu-bg: rgba(255, 255, 255, 0.98) !important;
        --menu-border: rgba(148, 163, 184, 0.4) !important;
        --menu-shadow: 0 16px 48px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05) !important;
        --text-primary: #334155 !important;
        --text-hover: #0284c7 !important;
        --item-hover-bg: rgba(14, 165, 233, 0.1) !important;
        --icon-opacity: 0.7 !important;
        --separator-bg: rgba(148, 163, 184, 0.3) !important;
      }

      /* Dark mode explicit class (optional, for consistency) */
      html.dark-mode {
        --menu-bg: rgba(30, 41, 59, 0.98) !important;
        --menu-border: rgba(51, 65, 85, 0.6) !important;
        --menu-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 0, 0, 0.3) !important;
        --text-primary: #f1f5f9 !important;
        --text-hover: #38bdf8 !important;
        --item-hover-bg: rgba(56, 189, 248, 0.1) !important;
        --icon-opacity: 0.6 !important;
        --separator-bg: rgba(71, 85, 105, 0.6) !important;
      }

      /* Remove browser default focus outline (orange border) */
      .menu-item:focus {
        outline: none !important;
        box-shadow: none !important;
        -webkit-focus-ring-color: transparent !important;
      }

      /* Optional: subtle focus indicator for accessibility */
      .menu-item:focus-visible {
        background: var(--item-hover-bg);
        outline: none !important;
        box-shadow: none !important;
      }

      /* First item focus state - prevent orange outline from autofocus */
      .menu-item:first-child:focus {
        outline: none !important;
        box-shadow: none !important;
        -webkit-focus-ring-color: transparent !important;
      }
    </style>
  </head>
  <body>
    <div class="menu" id="menu"></div>
    <script>
      const { ipcRenderer } = require("electron");

      /** Menu item definitions — each has an action key, label, SVG paths, and optional group separator */
      const ALL_ITEMS = {
        close: {
          label: "Close Tab",
          paths: ['<path d="M18 6L6 18M6 6l12 12" />'],
        },
        closeOther: {
          label: "Close Other Tabs",
          paths: [
            '<path d="M9 3H5a2 2 0 0 0-2 2v4" />',
            '<path d="M15 3h4a2 2 0 0 1 2 2v4" />',
            '<path d="M9 21H5a2 2 0 0 1-2-2v-4" />',
            '<path d="M15 21h4a2 2 0 0 0 2-2v-4" />',
            '<path d="M14 10l-4 4M10 10l4 4" />',
          ],
        },
        closeRight: {
          label: "Close Tabs to the Right",
          paths: [
            '<path d="M9 18l6-6-6-6" />',
            '<path d="M18 6L18 18" />',
          ],
        },
        duplicate: {
          label: "Duplicate Tab",
          paths: [
            '<rect x="8" y="8" width="13" height="13" rx="2" />',
            '<path d="M16 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h3" />',
          ],
        },
        moveStart: {
          label: "Move to Start",
          paths: [
            '<path d="M11 17l-5-5 5-5" />',
            '<path d="M18 17l-5-5 5-5" />',
          ],
        },
        moveEnd: {
          label: "Move to End",
          paths: [
            '<path d="M13 7l5 5-5 5" />',
            '<path d="M6 7l5 5-5 5" />',
          ],
        },
        reload: {
          label: "Reload",
          paths: [
            '<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />',
            '<path d="M3 3v5h5" />',
            '<path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />',
            '<path d="M16 16h5v5" />',
          ],
        },
        copyUrl: {
          label: "Copy URL",
          paths: [
            '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />',
            '<path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />',
          ],
        },
      };

      function buildMenu(items) {
        const menu = document.getElementById("menu");
        menu.innerHTML = "";

        items.forEach((entry) => {
          if (entry === "---") {
            const sep = document.createElement("div");
            sep.className = "separator";
            menu.appendChild(sep);
            return;
          }

          const def = ALL_ITEMS[entry];
          if (!def) return;

          const btn = document.createElement("button");
          btn.className = "menu-item";
          btn.innerHTML =
            '<svg viewBox="0 0 24 24" class="menu-icon">' +
            def.paths.join("") +
            "</svg>" +
            def.label;
          btn.addEventListener("click", () => {
            ipcRenderer.send("tab-context-menu:action", entry);
          });
          menu.appendChild(btn);
        });
      }

      ipcRenderer.on("tab-context-menu:data", (_event, data) => {
        buildMenu(data.items || []);
        if (data.theme === "light") {
          document.documentElement.classList.add("light-mode");
        } else {
          document.documentElement.classList.remove("light-mode");
        }
      });

      // Dismiss on Escape
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          ipcRenderer.send("tab-context-menu:dismiss");
        }
      });
    </script>
  </body>
</html>
