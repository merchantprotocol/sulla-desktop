<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sulla Heartbeat</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        font-size: 13px;
        background: transparent;
        color: #fff;
        user-select: none;
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .notification {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(40, 40, 40, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        max-height: 100vh;
        overflow: hidden;
      }

      .icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, #4682b4, #5a9fcf);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .icon svg {
        width: 20px;
        height: 20px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .content {
        flex: 1;
        min-width: 0;
      }

      .title {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 3px;
      }

      .message {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .dismiss {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        line-height: 20px;
        text-align: center;
        cursor: pointer;
        transition: opacity 0.15s;
        -webkit-app-region: no-drag;
        margin-top: 1px;
      }

      .dismiss:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
      .dismiss:active { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="notification">
      <div class="icon">
        <!-- Brain/pulse icon -->
        <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7z"/><path d="M9 21h6"/><path d="M10 21v1a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-1"/></svg>
      </div>
      <div class="content">
        <div class="title" id="title">Sulla</div>
        <div class="message" id="message"></div>
      </div>
      <button class="dismiss" id="dismiss-btn">&times;</button>
    </div>
    <script>
      const { ipcRenderer } = require("electron");

      ipcRenderer.on("heartbeat-notification-data", (_event, data) => {
        if (data.title) document.getElementById("title").textContent = data.title;
        if (data.message) document.getElementById("message").textContent = data.message;
      });

      document.getElementById("dismiss-btn").addEventListener("click", () => {
        ipcRenderer.send("heartbeat-notification-dismiss");
      });
    </script>
  </body>
</html>
