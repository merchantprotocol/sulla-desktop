<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' app:; script-src 'self' app: 'unsafe-inline' 'unsafe-eval'; img-src 'self' app: data:; style-src 'self' app: 'unsafe-inline'">
    <title>Sulla Panel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div class="app-layout">
        <!-- ─── Sidebar ──────────────────────────────────────── -->
        <nav class="sidebar">
          <button class="sidebar-btn active" data-panel="status" title="Status">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M12 8v4l2 2"/></svg>
          </button>
          <button class="sidebar-btn" data-panel="agent" title="Agent">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
          </button>
          <button class="sidebar-btn" data-panel="extensions" title="Extensions">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
          </button>
          <div class="sidebar-spacer"></div>
          <button class="sidebar-btn sidebar-bottom" data-panel="settings" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </nav>

        <div class="panel-content">
          <!-- ═══ Status panel (default) ═══════════════════════ -->
          <div id="panel-status" class="panel active">
            <div class="header">
              <span class="title">Sulla Desktop</span>
            </div>

            <!-- Docker status -->
            <div class="status-row">
              <span id="docker-dot" class="dot off"></span>
              <span class="status-label">Docker</span>
              <span id="docker-status" class="status-value">Stopped</span>
            </div>

            <!-- Kubernetes status -->
            <div class="status-row">
              <span id="k8s-dot" class="dot off"></span>
              <span class="status-label">Kubernetes</span>
              <span id="k8s-status" class="status-value">Stopped</span>
            </div>

            <div class="section-divider"></div>

            <!-- Quick links -->
            <div class="quick-links">
              <button class="link-btn" id="btn-open-sulla">
                <img class="link-icon" src="sulla-icon.png" width="14" height="14" alt="" />
                Open Sulla
              </button>
              <button class="link-btn" id="btn-open-editor">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                Agent Workbench
              </button>
              <button class="link-btn" id="btn-open-docker">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12.5c.85-.32 1.5-1.1 1.5-2 0-1.1-.9-2-2-2h-.5C18.5 5.5 16 3 13 3c-2 0-3.76 1.05-4.74 2.64A3.5 3.5 0 0 0 4 9a3.5 3.5 0 0 0-.74 6.92A3 3 0 0 0 6 21h12.5a2.5 2.5 0 0 0 1.5-4.5z"/><rect x="5" y="11" width="2" height="2" rx=".3" fill="currentColor"/><rect x="8" y="11" width="2" height="2" rx=".3" fill="currentColor"/><rect x="11" y="11" width="2" height="2" rx=".3" fill="currentColor"/><rect x="8" y="8" width="2" height="2" rx=".3" fill="currentColor"/><rect x="11" y="8" width="2" height="2" rx=".3" fill="currentColor"/><rect x="14" y="11" width="2" height="2" rx=".3" fill="currentColor"/><rect x="14" y="8" width="2" height="2" rx=".3" fill="currentColor"/></svg>
                Docker Dashboard
              </button>
              <button class="link-btn" id="btn-open-dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                Cluster Dashboard
              </button>
            </div>
          </div>

          <!-- ═══ Agent panel ══════════════════════════════════ -->
          <div id="panel-agent" class="panel">
            <div class="header">
              <span class="title">Agent</span>
            </div>

            <button class="action-btn" id="btn-secretary-mode">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Secretary Mode
            </button>

            <div class="section-divider" style="margin-top: 12px;"></div>

            <div class="info-text">
              Secretary Mode launches a dedicated AI assistant tab that monitors your workflow and proactively helps with tasks.
            </div>
          </div>

          <!-- ═══ Extensions panel ═════════════════════════════ -->
          <div id="panel-extensions" class="panel">
            <div class="header">
              <span class="title">Extensions</span>
            </div>

            <div id="extensions-list" class="extensions-list">
              <span class="empty-text">No extensions installed</span>
            </div>
          </div>

          <!-- ═══ Settings panel ═══════════════════════════════ -->
          <div id="panel-settings" class="panel">
            <div class="header">
              <span class="title">Settings</span>
            </div>

            <div class="settings-section">
              <div class="section-header">Help</div>
              <button class="link-btn" id="btn-premium-support">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Premium Support
              </button>
              <button class="link-btn" id="btn-documentation">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Documentation
              </button>
              <button class="link-btn" id="btn-discussions">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Discussions
              </button>
              <button class="link-btn" id="btn-issues">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Issues
              </button>

              <div class="section-divider"></div>

              <button class="link-btn" id="btn-check-updates">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                Check for Updates
              </button>
            </div>

            <div class="panel-footer">
              <button class="quit-btn" id="btn-quit">Quit Sulla Desktop</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
