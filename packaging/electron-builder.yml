# copyright needs to stay in sync with message in About panel in background.ts
copyright: Copyright © 2025-2026 Merchant Protocol LLC
productName: Sulla Desktop
icon: ./resources/icons/sulla-app-icon.png
appId: io.sulla.desktop
asar: true
asarUnpack:
  - '**/*.node'
  - 'node_modules/puppeteer-extra-plugin/**'
  - 'node_modules/clone-deep/**'
  - 'node_modules/puppeteer/**'
electronLanguages: [ en-US ]
extraResources:
  - resources/
  - '!resources/darwin/lima*.tgz'
  - '!resources/darwin/qemu*.tgz'
  - '!resources/linux/lima*.tgz'
  - '!resources/linux/qemu*.tgz'
  - '!resources/linux/staging/'
  - '!resources/win32/staging/'
  - '!resources/host/'
  - '!resources/**/*.js.map'
files:
  - dist/app/**/*
  - '!**/node_modules/*/prebuilds/!(${platform}*)/*.node'
mac:
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: ./resources/icons/sulla-app-icon.png
  target: [ dmg, zip ]
  identity: ~ # We sign in a separate step
  entitlements: ./packaging/entitlements.mac.plist
  entitlementsInherit: ./packaging/entitlements.mac.plist
  artifactName: Sulla-Desktop-${version}-mac.${ext}
  extendInfo:
    NSMicrophoneUsageDescription: "Sulla Desktop needs microphone access for voice features including chat, transcription, and capture studio."
    NSCameraUsageDescription: "Sulla Desktop uses your camera for the capture studio face-cam overlay."
    NSScreenCaptureUsageDescription: "Sulla Desktop needs screen recording access for the capture studio to record your screen."
    NSAppleEventsUsageDescription: "Sulla uses automation to interact with apps on your Mac — like managing your calendar, creating reminders, or controlling music playback. You choose which apps to enable."
  extraFiles:
    - build/signing-config-mac.yaml
    - { from: dist/electron-builder.yaml, to: electron-builder.yml }
win:
  icon: ./pkg/rancher-desktop/pages/agent/sulla-icon.ico
  target: [ zip ]
  artifactName: Sulla-Desktop-${version}-win.${ext}
  signtoolOptions:
    signingHashAlgorithms: [ sha256 ] # We only support Windows 10 + WSL2
  requestedExecutionLevel: asInvoker # The _app_ doesn't need privileges
  extraFiles:
    - build/wix/*
    - build/license.rtf
    - build/signing-config-win.yaml
    - { from: dist/wix-custom-action.dll, to: wix-custom-action.dll }
    - { from: dist/electron-builder.yaml, to: electron-builder.yml }
linux:
  category: Utility
  executableName: sulla-desktop
  artifactName: ${name}-${version}-linux.zip
  target: [ zip ]