name: Package

on:
  # Tag push → full matrix build + GitHub Release publication
  push:
    tags:
    - 'v*'
  # Manual dispatch → build artifacts only (release step is tag-gated below)
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  package:
    strategy:
      matrix:
        include:
        - platform: mac
          arch: x86_64
          runs-on: macos-15-intel
        - platform: mac
          arch: aarch64
          runs-on: macos-latest
        - platform: win
          runs-on: windows-latest
        - platform: linux
          runs-on: ubuntu-22.04
    runs-on: ${{ matrix.runs-on }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        # Needed to run `git describe` to get full version info
        fetch-depth: 0
    # timeout-minutes lives on the workflow step (composite actions
    # reject it). Caps a silent "Building fresh packages…" hang so we
    # fail fast instead of burning the full 30-minute job default.
    - uses: ./.github/actions/yarn-install
      timeout-minutes: 20
    - run: yarn build
    # When signing secrets are set, electron-builder picks them up from
    # these env vars and produces a Developer-ID-signed + notarized build
    # on macOS. Missing secrets = unsigned build (no error thrown); the
    # existing sign-mac / sign-win test-signing jobs handle CI verification.
    - run: yarn package
      env:
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    - name: Build bats.tar.gz
      if: matrix.platform == 'linux'
      run: make -C bats bats.tar.gz
    - name: Upload bats.tar.gz
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: matrix.platform == 'linux'
      with:
        name: bats.tar.gz
        path: bats/bats.tar.gz
        if-no-files-found: error
    # DMG upload removed — see packaging/electron-builder.yml mac.target
    # for context. We ship a signed+notarized ZIP instead, which works.
    - name: Upload mac zip
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: matrix.platform == 'mac'
      with:
        name: Sulla Desktop-mac.${{ matrix.arch }}.zip
        path: dist/Sulla-Desktop*.zip
        if-no-files-found: error
    - name: Upload Windows installer
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: matrix.platform == 'win'
      with:
        name: Sulla Desktop Setup.msi
        path: dist/Sulla.Desktop*.msi
        if-no-files-found: error
    - name: Upload Windows zip
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: matrix.platform == 'win'
      with:
        name: Sulla Desktop-win.zip
        path: dist/Sulla-Desktop-*-win.zip
        if-no-files-found: error
    - name: Upload Linux zip
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: matrix.platform == 'linux'
      with:
        name: Sulla Desktop-linux.zip
        path: dist/sulla-desktop-*-linux.zip
        if-no-files-found: error
    - name: Trigger OBS build
      if: matrix.platform == 'linux' && github.ref_type == 'branch' && ( startsWith(github.ref_name, 'main') || startsWith(github.ref_name, 'release-') )
      run: |
        if [[ -z $AWS_ACCESS_KEY_ID ]] || [[ -z $OBS_WEBHOOK_TOKEN ]]; then
          echo "Secrets unavailable, skipping."
          exit 0
        fi
        # in pull requests GITHUB_REF_NAME is in the form "<pr_number>/merge";
        # remove slashes since they aren't valid in filenames
        no_slash_ref_name="${GITHUB_REF_NAME//\//-}"
        zip_name="sulla-desktop-linux-${no_slash_ref_name}.zip"

        # Copy zip file to S3
        aws s3 cp \
          dist/sulla-desktop-*-linux.zip \
          "s3://sulla-desktop-assets-for-obs/$zip_name"

        # Trigger OBS services for relevant package in dev channel
        curl -X POST \
          -H "Authorization: Token ${OBS_WEBHOOK_TOKEN}" \
          "https://build.opensuse.org/trigger/runservice?project=isv:Sulla:dev&package=sulla-desktop-${GITHUB_REF_NAME}"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        OBS_WEBHOOK_TOKEN: ${{ secrets.OBS_WEBHOOK_TOKEN }}

  release:
    name: Create GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts
    - name: Prepare release assets
      run: |
        mkdir -p release
        # Flatten artifacts into release directory
        find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.zip' \) \
          ! -name 'bats.tar.gz' -exec cp {} release/ \;
        ls -lh release/
    - name: Create release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
      with:
        generate_release_notes: true
        files: release/*
