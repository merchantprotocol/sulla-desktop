apiVersion: sulla/v1
kind: Routine

id: routine-fetch-stripe-invoice
name: Fetch Stripe Invoice
description: >
  Fetches a Stripe invoice by ID and extracts line items.
  Use when a workflow needs structured invoice data.

version: 1.2.3
schemaversion: 1
enabled: true
createdAt: "2026-04-21T00:00:00.000Z"
updatedAt: "2026-04-21T00:00:00.000Z"
_status: production

slug: fetch-stripe-invoice
tags: [stripe, billing, finance, invoices]
section: Integrations
category: Billing
triggers:
  - "fetch invoice"
  - "get stripe invoice"
  - "look up invoice"

author: jonathon@merchantprotocol.com
license: proprietary
locked: false
trust: verified
immutable: true

spec:
  runtime: python
  entrypoint: functions/main.py::handler
  compatibility: "python>=3.12, stripe>=7.0"

  inputs:
    invoice_id:
      type: string
      required: true
      pattern: "^in_[a-zA-Z0-9]+$"
      description: Stripe invoice ID (begins with 'in_').
    include_line_items:
      type: boolean
      default: true
      description: Whether to hydrate invoice.lines with the full line-item list.

  outputs:
    invoice:
      type: object
      description: The Stripe invoice record, or null if not found.
      schema: resources/invoice-schema.json

  permissions:
    network:
      - api.stripe.com
    env:
      - STRIPE_KEY
    secrets:
      - stripe/api_key

  timeout: 30s
  retries:
    max: 3
    backoff: exponential

  resources:
    - resources/invoice-schema.json
  templates: []
